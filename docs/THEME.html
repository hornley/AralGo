<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AralGo Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@500;600&amp;family=Quicksand:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-primary": "#aad292",
                    "primary-fixed-dim": "#aad292",
                    "on-surface-variant": "#43483e",
                    "inverse-surface": "#2c322b",
                    "secondary-container": "#e7e2da",
                    "secondary-fixed": "#e7e2da",
                    "on-background": "#171d17",
                    "surface-container-highest": "#dfe4da",
                    "on-error": "#ffffff",
                    "secondary-fixed-dim": "#cbc6be",
                    "tertiary-fixed-dim": "#efbc96",
                    "tertiary-container": "#cc9d79",
                    "surface": "#f6fbf1",
                    "tertiary-fixed": "#ffdcc3",
                    "error-container": "#ffdad6",
                    "surface-bright": "#f6fbf1",
                    "surface-container-lowest": "#ffffff",
                    "surface-container": "#eaf0e5",
                    "surface-variant": "#dfe4da",
                    "on-secondary-fixed-variant": "#494641",
                    "surface-container-low": "#f0f5eb",
                    "primary": "#456732",
                    "primary-fixed": "#c6eeac",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e4eae0",
                    "on-primary": "#ffffff",
                    "secondary": "#615e58",
                    "background": "#f6fbf1",
                    "outline": "#73796d",
                    "on-secondary": "#ffffff",
                    "primary-container": "#8bb174",
                    "on-primary-fixed-variant": "#2e4f1d",
                    "surface-dim": "#d6dcd2",
                    "on-tertiary": "#ffffff",
                    "on-secondary-fixed": "#1d1b17",
                    "outline-variant": "#c3c8ba",
                    "on-surface": "#171d17",
                    "on-primary-fixed": "#072100",
                    "on-tertiary-fixed-variant": "#623f22",
                    "on-tertiary-container": "#553418",
                    "on-secondary-container": "#67645e",
                    "inverse-on-surface": "#edf3e8",
                    "tertiary": "#7c5637",
                    "on-tertiary-fixed": "#2f1500",
                    "surface-tint": "#456732",
                    "on-primary-container": "#234313",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "4px",
                    "card-gap": "16px",
                    "xl": "32px",
                    "md": "16px",
                    "base": "4px",
                    "lg": "24px",
                    "container-margin": "20px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "label-md": [
                            "Lexend"
                    ],
                    "headline-md": [
                            "Lexend"
                    ],
                    "headline-xl": [
                            "Lexend"
                    ],
                    "body-md": [
                            "Quicksand"
                    ],
                    "body-lg": [
                            "Quicksand"
                    ],
                    "headline-xl-mobile": [
                            "Lexend"
                    ],
                    "headline-lg": [
                            "Lexend"
                    ]
            },
            "fontSize": {
                    "label-md": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "letterSpacing": "0.02em",
                                    "fontWeight": "600"
                            }
                    ],
                    "headline-md": [
                            "20px",
                            {
                                    "lineHeight": "28px",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-xl": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "500"
                            }
                    ],
                    "body-lg": [
                            "18px",
                            {
                                    "lineHeight": "26px",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-xl-mobile": [
                            "28px",
                            {
                                    "lineHeight": "36px",
                                    "fontWeight": "600"
                            }
                    ],
                    "headline-lg": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "fontWeight": "600"
                            }
                    ]
            }
        },
        },
      }
    </script>
<style>
        body {
            background-color: #FFF9F1;
            /* Cozy Minimalism: Warm Cream Base */
        }
        
        .stationery-card {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(69, 103, 50, 0.06);
            /* Floating cards in Pure White with diffused sage shadow */
        }

        .stationery-card:active {
            box-shadow: 0 2px 10px rgba(69, 103, 50, 0.04);
            transform: translateY(2px);
            transition: all 0.2s ease-in-out;
        }
        
        .stationery-card-selected {
            background-color: #f0f5eb; /* Soft Mint / surface-container-low */
            box-shadow: 0 4px 20px rgba(69, 103, 50, 0.1);
            border: 2px solid #8bb174; /* primary-container */
        }

        .leaf-progress {
            transition: width 0.5s ease-in-out;
        }

        /* Ambient background decorations */
        .ambient-shape {
            position: absolute;
            opacity: 0.05;
            pointer-events: none;
            z-index: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-between font-body-md text-on-background overflow-x-hidden relative">
<!-- Decorative Ambient Shapes -->
<span class="material-symbols-outlined ambient-shape text-[120px] top-10 left-[-20px] text-primary rotate-12" data-icon="edit">edit</span>
<span class="material-symbols-outlined ambient-shape text-[100px] bottom-40 right-[-30px] text-tertiary -rotate-12" data-icon="attach_file">attach_file</span>
<span class="material-symbols-outlined ambient-shape text-[80px] top-1/2 left-[10%] text-secondary rotate-45" data-icon="sticky_note_2">sticky_note_2</span>
<!-- Header & Progress -->
<header class="w-full max-w-md px-container-margin pt-xl pb-md relative z-10 flex flex-col items-center">
<!-- Leaf Progress Indicator -->
<div class="w-full flex justify-between items-center mb-md">
<span class="material-symbols-outlined text-outline-variant cursor-pointer" data-icon="arrow_back">arrow_back</span>
<div class="flex items-center space-x-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="energy_savings_leaf">energy_savings_leaf</span>
<div class="w-32 h-2 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary leaf-progress w-1/3 rounded-full"></div>
</div>
<span class="font-label-md text-label-md text-primary">1 of 3</span>
</div>
<div class="w-6"></div> <!-- Spacer for centering -->
</div>
<h1 class="font-headline-xl-mobile text-headline-xl-mobile md:font-headline-xl md:text-headline-xl text-primary text-center mt-lg mb-sm">
            What's your grade level?
        </h1>
<p class="font-body-md text-body-md text-secondary text-center mb-xl">
            This helps us tailor your study plan.
        </p>
</header>
<!-- Main Content Area: Bento Grid of Options -->
<main class="w-full max-w-md px-container-margin flex-grow relative z-10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Option: Elementary -->
<button class="stationery-card rounded-lg p-lg flex flex-col items-center justify-center text-center transition-all duration-200 focus:outline-none">
<div class="w-16 h-16 rounded-full bg-tertiary-container flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-tertiary-container text-3xl" data-icon="child_care">child_care</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface">Elementary</h3>
</button>
<!-- Option: High School (Selected) -->
<button class="stationery-card stationery-card-selected rounded-lg p-lg flex flex-col items-center justify-center text-center transition-all duration-200 focus:outline-none relative">
<!-- Selection Sparkle -->
<span class="material-symbols-outlined absolute top-4 right-4 text-primary" data-icon="stars" data-weight="fill">stars</span>
<div class="w-16 h-16 rounded-full bg-primary-container flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="school">school</span>
</div>
<h3 class="font-headline-md text-headline-md text-primary">High School</h3>
</button>
<!-- Option: College -->
<button class="stationery-card rounded-lg p-lg flex flex-col items-center justify-center text-center transition-all duration-200 focus:outline-none">
<div class="w-16 h-16 rounded-full bg-surface-dim flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="menu_book">menu_book</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface">College</h3>
</button>
<!-- Option: Graduate -->
<button class="stationery-card rounded-lg p-lg flex flex-col items-center justify-center text-center transition-all duration-200 focus:outline-none">
<div class="w-16 h-16 rounded-full bg-secondary-container flex items-center justify-center mb-sm">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" data-icon="history_edu">history_edu</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface">Graduate</h3>
</button>
</div>
</main>
<!-- Bottom Actions -->
<footer class="w-full max-w-md px-container-margin pb-xl pt-lg relative z-10 flex flex-col items-center">
<!-- Sticky Note Tip -->
<div class="bg-[#fef08a] p-4 rounded-xl rotate-[-1deg] shadow-sm mb-lg flex items-start max-w-xs self-end">
<span class="material-symbols-outlined text-tertiary mr-2 text-xl" data-icon="lightbulb">lightbulb</span>
<p class="font-body-md text-body-md text-on-surface text-sm">
                You can always change this later in your settings!
            </p>
</div>
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-full shadow-lg flex justify-center items-center active:scale-95 transition-transform">
            Next
            <span class="material-symbols-outlined ml-2 text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
</body></html>
